<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple To-Do App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-content: center;
            padding-top: 50px;
        }
        .todo-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
        }
        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            padding: 10px 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #218838;
        }
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f9f9f9;
            padding: 10px;
            border-bottom: 1px solid #eee;
            border-radius: 4px;
            margin-bottom: 8px;
        }
        .delete-btn {
            background-color: #dc3545;
            padding: 5px 10px;
            font-size: 12px;
        }
        .delete-btn:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>

<div class="todo-container">
    <h2>My To-Do List</h2>
    <div class="input-section">
        <input type="text" id="todo-input" placeholder="Add a new task...">
        <button onclick="addTask()">Add</button>
    </div>
    <ul id="todo-list"></ul>
</div>

<script>
    // Load tasks from LocalStorage when the page opens
    document.addEventListener('DOMContentLoaded', loadTasks);

    function addTask() {
        const input = document.getElementById('todo-input');
        const taskText = input.value.trim();
        
        if (taskText === '') return; // Don't add empty tasks

        createTaskElement(taskText);
        saveTaskToStorage(taskText);
        
        input.value = ''; // Clear input field
    }

    function createTaskElement(text) {
        const ul = document.getElementById('todo-list');
        const li = document.createElement('li');
        
        li.innerHTML = `
            <span>${text}</span>
            <button class="delete-btn" onclick="deleteTask(this, '${text}')">Delete</button>
        `;
        
        ul.appendChild(li);
    }

    function deleteTask(button, text) {
        // Remove from UI
        const li = button.parentElement;
        li.remove();

        // Remove from LocalStorage
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        tasks = tasks.filter(task => task !== text);
        localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function saveTaskToStorage(text) {
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        tasks.push(text);
        localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function loadTasks() {
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        tasks.forEach(task => createTaskElement(task));
    }
</script>

</body>
</html>
